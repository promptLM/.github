# Nightly snapshot bake. Produces a Hetzner Cloud snapshot containing the
# baseline runner image (Ubuntu 24.04 + Docker + JDK 17/21 + Node 22 + Maven
# + Gradle + common CLI), then updates the org-level variable
# HETZNER_RUNNER_SNAPSHOT_ID so every caller of hetzner-runner.yml picks it up.
#
# One bake, many consumers. Runs from THIS repo on a schedule; downstream
# project repos do NOT need their own bake.
#
# Required secrets (org-level, scoped to this repo):
#   - HCLOUD_TOKEN          Hetzner Cloud API token (Read & Write)
#   - GH_ORG_VAR_TOKEN      Fine-grained GitHub PAT with Organization
#                           permissions → "Variables" → Read and write
#                           (the resource owner is the promptLM org).
#                           Used to update org variable
#                           HETZNER_RUNNER_SNAPSHOT_ID after each bake.

name: Hetzner snapshot bake

on:
  schedule:
    - cron: "0 3 * * *"          # 03:00 UTC nightly
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hetzner-snapshot-bake
  cancel-in-progress: false       # let an in-flight bake finish; never overlap

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      SERVER_NAME: snapshot-bake-${{ github.run_id }}
      SERVER_TYPE: cpx21          # cheap; bigger doesn't help bake speed
      SSH_KEY_NAME: snapshot-bake
      ORG: promptLM
    steps:
      - name: Install hcloud CLI
        run: |
          curl -fsSL "https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin hcloud
          hcloud version

      - name: Generate ephemeral SSH key for the bake
        run: |
          ssh-keygen -t ed25519 -N "" -f /tmp/bake_key -C "snapshot-bake"
          PUB=$(cat /tmp/bake_key.pub)
          hcloud ssh-key delete "$SSH_KEY_NAME" 2>/dev/null || true
          hcloud ssh-key create --name "$SSH_KEY_NAME" --public-key "$PUB"

      - name: Create bake server (Ubuntu 24.04)
        run: |
          hcloud server create \
            --name "$SERVER_NAME" \
            --type "$SERVER_TYPE" \
            --location fsn1 \
            --image ubuntu-24.04 \
            --ssh-key "$SSH_KEY_NAME" \
            --label role=snapshot-bake

      - name: Wait for SSH
        run: |
          IP=$(hcloud server ip "$SERVER_NAME")
          echo "SERVER_IP=$IP" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if ssh -i /tmp/bake_key -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@$IP 'echo ok' 2>/dev/null; then
              echo "SSH up"
              break
            fi
            sleep 10
          done

      - name: Provision baseline
        run: |
          ssh -i /tmp/bake_key -o StrictHostKeyChecking=no root@$SERVER_IP bash -s <<'EOF'
          set -euxo pipefail

          # Docker
          curl -fsSL https://get.docker.com | sh
          systemctl enable docker

          # APT packages
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            openjdk-17-jdk-headless openjdk-21-jdk-headless \
            maven \
            git curl wget jq unzip tar gzip make htop vim ca-certificates

          # Node LTS 22 via NodeSource
          curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
          apt-get install -y nodejs
          npm install -g pnpm yarn

          # Gradle 8.x (apt has older versions; fetch from gradle.org)
          GRADLE_VERSION=8.10
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          ln -sf /opt/gradle-${GRADLE_VERSION}/bin/gradle /usr/local/bin/gradle
          rm /tmp/gradle.zip

          # Runner user with docker group membership
          useradd -m -s /bin/bash runner || true
          usermod -aG docker runner

          # Shrink snapshot: clean apt cache, rotate journals
          apt-get clean
          rm -rf /var/lib/apt/lists/*
          journalctl --rotate || true
          journalctl --vacuum-time=1s || true

          # Verify toolchain
          docker --version
          java -version 2>&1
          mvn -v
          gradle -v
          node --version
          npm --version
          EOF

      - name: Power off for clean snapshot
        run: hcloud server poweroff "$SERVER_NAME"

      - name: Create snapshot
        run: |
          OUT=$(hcloud server create-image \
            --description "runner-baseline-$(date -u +%Y%m%d)" \
            --type snapshot \
            "$SERVER_NAME" \
            -o json)
          ID=$(echo "$OUT" | jq -r '.image.id')
          echo "SNAPSHOT_ID=$ID" >> $GITHUB_ENV
          echo "Snapshot created: $ID"

      - name: Update org variable HETZNER_RUNNER_SNAPSHOT_ID
        env:
          GH_TOKEN: ${{ secrets.GH_ORG_VAR_TOKEN }}
        run: |
          gh api -X PATCH \
            "orgs/${ORG}/actions/variables/HETZNER_RUNNER_SNAPSHOT_ID" \
            -f "name=HETZNER_RUNNER_SNAPSHOT_ID" \
            -f "value=${SNAPSHOT_ID}" \
            -f "visibility=all" \
          || gh api -X POST \
            "orgs/${ORG}/actions/variables" \
            -f "name=HETZNER_RUNNER_SNAPSHOT_ID" \
            -f "value=${SNAPSHOT_ID}" \
            -f "visibility=all"

      - name: Prune old snapshots (keep last 3)
        run: |
          hcloud image list -t snapshot -o json \
            | jq -r '.[] | select(.description | startswith("runner-baseline-")) | .id' \
            | sort -n \
            | head -n -3 \
            | xargs -r -I {} hcloud image delete {}

      - name: Cleanup — bake server and SSH key (always)
        if: always()
        run: |
          hcloud server delete "$SERVER_NAME" 2>/dev/null || true
          hcloud ssh-key delete "$SSH_KEY_NAME" 2>/dev/null || true
