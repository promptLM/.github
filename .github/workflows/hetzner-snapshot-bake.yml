# Nightly snapshot bake. Produces a Hetzner Cloud snapshot containing the
# baseline runner image (Ubuntu 24.04 + Docker + JDK 17/21 + Node 22 + Maven
# + Gradle + common CLI), then updates the org-level variable
# HETZNER_RUNNER_SNAPSHOT_ID so every caller of hetzner-runner.yml picks it up.
#
# One bake, many consumers. Runs from THIS repo on a schedule; downstream
# project repos do NOT need their own bake.
#
# Required secrets (org-level, scoped to this repo):
#   - HCLOUD_TOKEN          Hetzner Cloud API token (Read & Write)
#   - GH_ORG_VAR_TOKEN      Fine-grained GitHub PAT with Organization
#                           permissions → "Variables" → Read and write
#                           (the resource owner is the promptLM org).
#                           Used to update org variable
#                           HETZNER_RUNNER_SNAPSHOT_ID after each bake.

name: Hetzner snapshot bake

on:
  schedule:
    - cron: "0 3 * * *"          # 03:00 UTC nightly
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hetzner-snapshot-bake
  cancel-in-progress: false       # let an in-flight bake finish; never overlap

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      SERVER_NAME: snapshot-bake-${{ github.run_id }}
      SERVER_TYPE: cx33           # cpx21 retired in fsn1; cx33 matches runner default
      SSH_KEY_NAME: snapshot-bake
      ORG: promptLM
    steps:
      - name: Preflight — verify GH_ORG_VAR_TOKEN can read org variables
        # Fail fast (~2s) instead of after a 15-min bake. The actual write
        # later uses the same Variables permission as this read probe, so
        # if this passes the final PATCH/POST should too.
        env:
          GH_TOKEN: ${{ secrets.GH_ORG_VAR_TOKEN }}
        run: |
          set -uo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::Secret GH_ORG_VAR_TOKEN is unset on this repository."
            echo "::error::Set it under https://github.com/organizations/${ORG}/settings/secrets/actions"
            echo "::error::with visibility = Selected repositories = promptLM/.github."
            exit 1
          fi
          if ! gh api "orgs/${ORG}/actions/variables" > /dev/null 2>&1; then
            echo "::error::GH_ORG_VAR_TOKEN exists but cannot access org variables on ${ORG}."
            echo "::error::Required: fine-grained PAT, Resource owner = ${ORG} (NOT your personal account),"
            echo "::error::Organization permissions → Variables → Read and write."
            echo "::error::If ${ORG} has SAML SSO, the token must also be SSO-authorized after creation."
            echo "::error::Alternatively, a classic PAT with admin:org scope works."
            exit 1
          fi
          echo "✓ GH_ORG_VAR_TOKEN has org-variable access on ${ORG}"

      - name: Install hcloud CLI
        run: |
          curl -fsSL "https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin hcloud
          hcloud version

      - name: Generate ephemeral SSH key for the bake
        run: |
          ssh-keygen -t ed25519 -N "" -f /tmp/bake_key -C "snapshot-bake"
          PUB=$(cat /tmp/bake_key.pub)
          hcloud ssh-key delete "$SSH_KEY_NAME" 2>/dev/null || true
          hcloud ssh-key create --name "$SSH_KEY_NAME" --public-key "$PUB"

      - name: Create bake server (Ubuntu 24.04)
        run: |
          hcloud server create \
            --name "$SERVER_NAME" \
            --type "$SERVER_TYPE" \
            --location fsn1 \
            --image ubuntu-24.04 \
            --ssh-key "$SSH_KEY_NAME" \
            --label role=snapshot-bake

      - name: Wait for SSH
        run: |
          IP=$(hcloud server ip "$SERVER_NAME")
          echo "SERVER_IP=$IP" >> $GITHUB_ENV
          # 30 attempts × 10s = 5 min max. cloud-init normally finishes well
          # under that; if it doesn't, fail loudly instead of falling through
          # into "Provision baseline" with a broken connection.
          for i in $(seq 1 30); do
            if ssh -i /tmp/bake_key -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@$IP 'echo ok' 2>/dev/null; then
              echo "SSH up after ${i} attempt(s)"
              exit 0
            fi
            sleep 10
          done
          echo "::error::SSH never came up on $IP after 5 minutes"
          exit 1

      - name: Provision baseline
        run: |
          ssh -i /tmp/bake_key -o StrictHostKeyChecking=no root@$SERVER_IP bash -s <<'EOF'
          set -euxo pipefail

          # Docker
          curl -fsSL https://get.docker.com | sh
          systemctl enable docker

          # APT packages
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            openjdk-17-jdk-headless openjdk-21-jdk-headless \
            maven \
            git curl wget jq unzip tar gzip make htop vim ca-certificates

          # Node LTS 22 via NodeSource
          curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
          apt-get install -y nodejs
          npm install -g pnpm yarn

          # Gradle 8.x (apt has older versions; fetch from gradle.org)
          GRADLE_VERSION=8.10
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          ln -sf /opt/gradle-${GRADLE_VERSION}/bin/gradle /usr/local/bin/gradle
          rm /tmp/gradle.zip

          # Runner user with docker group membership
          useradd -m -s /bin/bash runner || true
          usermod -aG docker runner

          # Shrink snapshot: clean apt cache, rotate journals
          apt-get clean
          rm -rf /var/lib/apt/lists/*
          journalctl --rotate || true
          journalctl --vacuum-time=1s || true

          # Verify toolchain
          docker --version
          java -version 2>&1
          mvn -v
          gradle -v
          node --version
          npm --version
          EOF

      - name: Power off for clean snapshot
        run: hcloud server poweroff "$SERVER_NAME"

      - name: Create snapshot
        run: |
          # Unique description so we can look the image up afterwards.
          # `hcloud server create-image` does not support -o json, so we
          # query the image by description instead of parsing stdout.
          DESC="runner-baseline-${GITHUB_RUN_ID}-$(date -u +%Y%m%d%H%M%S)"
          hcloud server create-image \
            --description "$DESC" \
            --type snapshot \
            "$SERVER_NAME"
          ID=$(hcloud image list -t snapshot -o json \
            | jq -r --arg d "$DESC" '.[] | select(.description==$d) | .id')
          if [ -z "$ID" ]; then
            echo "Failed to locate snapshot with description $DESC"
            exit 1
          fi
          echo "SNAPSHOT_ID=$ID" >> $GITHUB_ENV
          echo "Snapshot created: $ID ($DESC)"

      - name: Update org variable HETZNER_RUNNER_SNAPSHOT_ID
        env:
          GH_TOKEN: ${{ secrets.GH_ORG_VAR_TOKEN }}
          VAR_NAME: HETZNER_RUNNER_SNAPSHOT_ID
        run: |
          set -euo pipefail

          # Probe for existence first. The old `PATCH || POST` swallowed any
          # non-2xx response from PATCH (e.g. 403 token-permission errors) and
          # then immediately tried POST, producing two stacked errors with no
          # signal about which one was real. Branch explicitly on 404 vs 200,
          # surface anything else.
          http_status=$(gh api \
            -H "Accept: application/vnd.github+json" \
            --include \
            "orgs/${ORG}/actions/variables/${VAR_NAME}" 2>/dev/null \
            | awk 'NR==1{print $2; exit}' || true)

          case "${http_status}" in
            200)
              echo "Variable ${VAR_NAME} exists — updating via PATCH"
              gh api -X PATCH \
                "orgs/${ORG}/actions/variables/${VAR_NAME}" \
                -f "name=${VAR_NAME}" \
                -f "value=${SNAPSHOT_ID}" \
                -f "visibility=all"
              ;;
            404)
              echo "Variable ${VAR_NAME} does not exist — creating via POST"
              gh api -X POST \
                "orgs/${ORG}/actions/variables" \
                -f "name=${VAR_NAME}" \
                -f "value=${SNAPSHOT_ID}" \
                -f "visibility=all"
              ;;
            *)
              echo "::error::Unexpected status ${http_status:-<none>} probing orgs/${ORG}/actions/variables/${VAR_NAME}."
              echo "::error::Most likely cause: secrets.GH_ORG_VAR_TOKEN lacks Organization → Variables: Read and write, has expired, or was not approved by an org admin."
              exit 1
              ;;
          esac

      - name: Prune old snapshots (keep last 3)
        run: |
          hcloud image list -t snapshot -o json \
            | jq -r '.[] | select(.description | startswith("runner-baseline-")) | .id' \
            | sort -n \
            | head -n -3 \
            | xargs -r -I {} hcloud image delete {}

      - name: Cleanup — bake server and SSH key (always)
        if: always()
        run: |
          hcloud server delete "$SERVER_NAME" 2>/dev/null || true
          hcloud ssh-key delete "$SSH_KEY_NAME" 2>/dev/null || true
