# Self-contained CI tests for the three composite actions under
# .github/actions/. Each job exercises a specific behaviour against
# fixtures committed under tests/fixtures/. No cross-repo state, no
# real Dependabot PR required.
#
# Replaces tests 4–6 of the original "Test plan" in PR #11 (which
# needed a real `dependabot[bot]` PR — unfakeable by an agent or
# human) with deterministic dry-run cases via the auto-merge action's
# input override surface (the `pr-*` and `dry-run` inputs).

name: Test composite actions

on:
  pull_request:
    paths:
      - '.github/actions/**'
      - '.github/workflows/test.yml'
      - 'tests/**'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── audit-action-pins ─────────────────────────────────────────────────
  audit-passes-on-pinned-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/audit-action-pins
        with:
          workflows-path: tests/fixtures/pinned-workflow/workflows

  audit-fails-on-unpinned-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: audit
        continue-on-error: true
        uses: ./.github/actions/audit-action-pins
        with:
          workflows-path: tests/fixtures/unpinned-workflow/workflows
      - name: Assert audit reported drift
        run: |
          if [ "${{ steps.audit.outcome }}" != "failure" ]; then
            echo "::error::expected audit to exit non-zero on unpinned fixture, got outcome=${{ steps.audit.outcome }}"
            exit 1
          fi
          echo "audit outcome=${{ steps.audit.outcome }} (as expected)"

  # ── pin-action-shas ──────────────────────────────────────────────────
  pin-rewrites-and-is-idempotent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Stage fixture in a writable path
        run: |
          mkdir -p /tmp/under-test
          cp -r tests/fixtures/unpinned-workflow/workflows /tmp/under-test/workflows
      - id: pin1
        uses: ./.github/actions/pin-action-shas
        with:
          workflows-path: /tmp/under-test/workflows
      - name: Assert first pass rewrote at least one ref
        run: |
          if [ "${{ steps.pin1.outputs.changed }}" = "0" ]; then
            echo "::error::expected first pass to rewrite refs, got changed=0"
            exit 1
          fi
          echo "first pass changed=${{ steps.pin1.outputs.changed }}"
      - name: Assert the rewritten file contains a comment preserving the original ref
        run: |
          if ! grep -E '@[0-9a-f]{40}.*# v[0-9]' /tmp/under-test/workflows/ci.yml; then
            echo "::error::expected '@<sha> # v<x>' comment in rewritten file"
            sed -n '1,40p' /tmp/under-test/workflows/ci.yml
            exit 1
          fi
      - id: pin2
        uses: ./.github/actions/pin-action-shas
        with:
          workflows-path: /tmp/under-test/workflows
      - name: Assert second pass is a no-op (idempotence)
        run: |
          if [ "${{ steps.pin2.outputs.changed }}" != "0" ]; then
            echo "::error::expected no-op on already-pinned workflow, got changed=${{ steps.pin2.outputs.changed }}"
            exit 1
          fi
          echo "second pass changed=${{ steps.pin2.outputs.changed }} (idempotent)"

  # ── auto-merge-deps decision matrix ──────────────────────────────────
  # Each case fabricates the PR fields via the action's override inputs
  # and uses dry-run mode so no real `gh pr merge` call fires. Asserts
  # the action's `decision` output matches the expected verdict.
  auto-merge-decisions:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dependabot-minor-bump-proceeds
            author: 'dependabot[bot]'
            title: 'Bump foo from 1.2.3 to 1.3.0'
            labels: '[]'
            include-major: 'false'
            expected: 'proceed:dry-run'
          - name: renovate-minor-bump-proceeds
            author: 'renovate[bot]'
            title: 'Update dependency foo to v1.3.0'
            labels: '[]'
            include-major: 'false'
            expected: 'proceed:dry-run'
          - name: human-author-skips
            author: 'octocat'
            title: 'Bump foo from 1.2.3 to 1.3.0'
            labels: '[]'
            include-major: 'false'
            expected: 'skip:author'
          - name: do-not-merge-label-skips
            author: 'dependabot[bot]'
            title: 'Bump foo from 1.2.3 to 1.3.0'
            labels: '["do-not-merge"]'
            include-major: 'false'
            expected: 'skip:label:do-not-merge'
          - name: breaking-change-label-skips
            author: 'dependabot[bot]'
            title: 'Bump foo from 1.2.3 to 1.3.0'
            labels: '["breaking-change"]'
            include-major: 'false'
            expected: 'skip:label:breaking-change'
          - name: blocked-label-skips
            author: 'dependabot[bot]'
            title: 'Bump foo from 1.2.3 to 1.3.0'
            labels: '["blocked","ready-for-review"]'
            include-major: 'false'
            expected: 'skip:label:blocked'
          - name: major-bump-skips-by-default
            author: 'dependabot[bot]'
            title: 'Bump foo from 1.2.3 to 2.0.0'
            labels: '[]'
            include-major: 'false'
            expected: 'skip:major'
          - name: major-bump-allowed-when-opted-in
            author: 'dependabot[bot]'
            title: 'Bump foo from 1.2.3 to 2.0.0'
            labels: '[]'
            include-major: 'true'
            expected: 'proceed:dry-run'
          - name: draft-pr-skips
            author: 'dependabot[bot]'
            title: 'Bump foo from 1.2.3 to 1.3.0'
            labels: '[]'
            include-major: 'false'
            draft: 'true'
            expected: 'skip:draft'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: decide
        uses: ./.github/actions/auto-merge-deps
        with:
          dry-run: 'true'
          include-major: ${{ matrix.include-major }}
          pr-number: '1'
          pr-author: ${{ matrix.author }}
          pr-title: ${{ matrix.title }}
          pr-labels-json: ${{ matrix.labels }}
          pr-draft: ${{ matrix.draft || 'false' }}
      - name: Assert decision matches expectation
        run: |
          actual='${{ steps.decide.outputs.decision }}'
          expected='${{ matrix.expected }}'
          if [ "$actual" != "$expected" ]; then
            echo "::error title=case ${{ matrix.name }}::expected decision='$expected' got '$actual'"
            exit 1
          fi
          echo "case ${{ matrix.name }}: PASS (decision=$actual)"
