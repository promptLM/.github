# Dependabot version updates — promptLM/.github (org repo)
#
# Only github-actions: the reusable workflows here have `uses:` pins that
# need bumping. No language manifest at the repo root.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # D-66 (research/maven-central/log.md): the Java release reusable is
      # slated to migrate from actions/attest-build-provenance to
      # actions/attest directly, per the upstream README's recommendation
      # for new implementations. Suppress version-bump noise on the wrapper
      # until the migration lands.
      - dependency-name: "actions/attest-build-provenance"
