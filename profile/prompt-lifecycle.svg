<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 460" font-family="Inter, system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .title       { font-size: 28px; font-weight: 700; fill: #0f172a; }
      .subtitle    { font-size: 14px; fill: #475569; }
      .band        { font-size: 12px; font-weight: 700; fill: #475569; letter-spacing: 1.2px; }
      .stage-num   { font-size: 11px; font-weight: 700; fill: #64748b; letter-spacing: 0.8px; }
      .stage-name  { font-size: 14px; font-weight: 700; fill: #0f172a; }
      .stage-tool  { font-size: 11px; font-weight: 600; fill: #1e40af; }
      .stage-desc  { font-size: 11px; fill: #334155; }
      .wire        { font-size: 11px; font-weight: 600; fill: #047857; font-family: 'JetBrains Mono', Menlo, Consolas, monospace; }
      .wire-label  { font-size: 9px; fill: #64748b; }
      .legend      { font-size: 11px; fill: #475569; }
      .footer      { font-size: 11px; fill: #94a3b8; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1280" height="460" fill="#f8fafc"/>

  <!-- Header -->
  <text x="40" y="50" class="title">promptLM — prompt lifecycle</text>
  <text x="40" y="74" class="subtitle">From author to app runtime: who owns each step, what flows between them.</text>

  <!-- Legend -->
  <g transform="translate(900, 30)">
    <rect x="0" y="0" width="340" height="56" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="14" y="14" width="14" height="14" rx="3" fill="#ecfdf5" stroke="#047857"/>
    <text x="34" y="25" class="legend">Author</text>
    <rect x="110" y="14" width="14" height="14" rx="3" fill="#dbeafe" stroke="#1d4ed8"/>
    <text x="130" y="25" class="legend">Distribute</text>
    <rect x="220" y="14" width="14" height="14" rx="3" fill="#ede9fe" stroke="#6d28d9"/>
    <text x="240" y="25" class="legend">Consume</text>
    <text x="14" y="46" class="legend"><tspan font-weight="700" fill="#1e40af">blue text</tspan> = promptLM repo · plain text = your tooling</text>
  </g>

  <!-- Band labels -->
  <text x="40" y="118" class="band">AUTHOR</text>
  <text x="595" y="118" class="band">DISTRIBUTE</text>
  <text x="855" y="118" class="band">CONSUME</text>
  <line x1="40" y1="126" x2="1240" y2="126" stroke="#e2e8f0"/>

  <!-- Lane backgrounds (extended to enclose the contracts row) -->
  <rect x="40"   y="138" width="510" height="260" rx="12" fill="#f0fdf4" opacity="0.55"/>
  <rect x="566"  y="138" width="248" height="260" rx="12" fill="#eff6ff" opacity="0.55"/>
  <rect x="830"  y="138" width="410" height="260" rx="12" fill="#f5f3ff" opacity="0.55"/>

  <!-- STAGE 1: Author -->
  <g transform="translate(54, 152)">
    <rect width="158" height="172" rx="10" fill="#ecfdf5" stroke="#047857" stroke-width="1.5"/>
    <text x="12" y="22" class="stage-num">STAGE 1</text>
    <text x="12" y="42" class="stage-name">Author prompt</text>
    <text x="12" y="62" class="stage-tool">promptlm-app</text>
    <text x="12" y="76" class="stage-desc">Studio (web) or CLI</text>
    <text x="12" y="104" class="stage-desc">Authors edit the prompt</text>
    <text x="12" y="118" class="stage-desc">in promptspec.yml — the</text>
    <text x="12" y="132" class="stage-desc">full authoring format.</text>
  </g>

  <!-- STAGE 2: VCS -->
  <g transform="translate(242, 152)">
    <rect width="142" height="172" rx="10" fill="#ecfdf5" stroke="#047857" stroke-width="1.5"/>
    <text x="12" y="22" class="stage-num">STAGE 2</text>
    <text x="12" y="42" class="stage-name">Version control</text>
    <text x="12" y="62" class="stage-desc">your Git host</text>
    <text x="12" y="76" class="stage-desc">(GitHub · Gitea · …)</text>
    <text x="12" y="104" class="stage-desc">Source of truth.</text>
    <text x="12" y="118" class="stage-desc">Reviewable, diffable,</text>
    <text x="12" y="132" class="stage-desc">versionable like code.</text>
  </g>

  <!-- STAGE 3: Build & bundle -->
  <g transform="translate(414, 152)">
    <rect width="124" height="172" rx="10" fill="#ecfdf5" stroke="#047857" stroke-width="1.5"/>
    <text x="12" y="22" class="stage-num">STAGE 3</text>
    <text x="12" y="42" class="stage-name">Build &amp; bundle</text>
    <text x="12" y="62" class="stage-tool">promptLM</text>
    <text x="12" y="76" class="stage-tool">build pipeline</text>
    <text x="12" y="104" class="stage-desc">Emits prompt.yml —</text>
    <text x="12" y="118" class="stage-desc">the delivery subset</text>
    <text x="12" y="132" class="stage-desc">SDKs must parse.</text>
  </g>

  <!-- STAGE 4: Publish -->
  <g transform="translate(580, 152)">
    <rect width="220" height="172" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="12" y="22" class="stage-num">STAGE 4</text>
    <text x="12" y="42" class="stage-name">Publish to registry</text>
    <text x="12" y="62" class="stage-desc">artifact registry</text>
    <text x="12" y="76" class="stage-desc">(your Artifactory, etc.)</text>
    <text x="12" y="104" class="stage-desc">Bundles are versioned</text>
    <text x="12" y="118" class="stage-desc">artifacts; consuming apps</text>
    <text x="12" y="132" class="stage-desc">pin a specific version.</text>
  </g>

  <!-- STAGE 5: Declare dep -->
  <g transform="translate(844, 152)">
    <rect width="124" height="172" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="12" y="22" class="stage-num">STAGE 5</text>
    <text x="12" y="42" class="stage-name">Declare dep</text>
    <text x="12" y="62" class="stage-desc">your app</text>
    <text x="12" y="90" class="stage-desc">Add the bundle as a</text>
    <text x="12" y="104" class="stage-desc">build dependency.</text>
    <text x="12" y="128" class="stage-desc">Maven · Gradle ·</text>
    <text x="12" y="142" class="stage-desc">pip · npm.</text>
  </g>

  <!-- STAGE 6: SDK loads -->
  <g transform="translate(998, 152)">
    <rect width="124" height="172" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="12" y="22" class="stage-num">STAGE 6</text>
    <text x="12" y="42" class="stage-name">SDK loads</text>
    <text x="12" y="62" class="stage-tool">promptlm-clients</text>
    <text x="12" y="76" class="stage-desc">Java · Python · TS</text>
    <text x="12" y="104" class="stage-desc">Java entry point:</text>
    <text x="12" y="118" class="stage-desc" font-family="JetBrains Mono, Menlo, monospace" font-size="10">ClasspathPromptLoader</text>
  </g>

  <!-- STAGE 7: App use -->
  <g transform="translate(1152, 152)">
    <rect width="74" height="172" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="10" y="22" class="stage-num">STAGE 7</text>
    <text x="10" y="42" class="stage-name">App use</text>
    <text x="10" y="62" class="stage-desc">Reads</text>
    <text x="10" y="76" class="stage-desc">prompt</text>
    <text x="10" y="90" class="stage-desc">fields at</text>
    <text x="10" y="104" class="stage-desc">runtime.</text>
  </g>

  <!-- ============== Arrows (in gaps, between cards) ============== -->
  <g stroke="#64748b" stroke-width="1.5" fill="none">
    <line x1="216" y1="238" x2="238" y2="238" marker-end="url(#arr)"/>
    <line x1="388" y1="238" x2="410" y2="238" marker-end="url(#arr)"/>
    <line x1="542" y1="238" x2="564" y2="238" marker-end="url(#arr)"/>
    <line x1="804" y1="238" x2="826" y2="238" marker-end="url(#arr)"/>
    <line x1="972" y1="238" x2="994" y2="238" marker-end="url(#arr)"/>
    <line x1="1126" y1="238" x2="1148" y2="238" marker-end="url(#arr)"/>
  </g>

  <!-- ============== Contracts bus (labels below the cards) ============== -->
  <!-- Subtle dotted leader lines from arrow midpoint down to the label row -->
  <g stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2 3" fill="none">
    <line x1="227"  y1="248" x2="227"  y2="346"/>
    <line x1="399"  y1="248" x2="399"  y2="346"/>
    <line x1="553"  y1="248" x2="553"  y2="346"/>
    <line x1="815"  y1="248" x2="815"  y2="346"/>
    <line x1="983"  y1="248" x2="983"  y2="346"/>
    <line x1="1137" y1="248" x2="1137" y2="346"/>
  </g>

  <!-- Contract labels (centered under each gap, in empty space below cards) -->
  <g text-anchor="middle">
    <text x="227"  y="360" class="wire">promptspec.yml</text>
    <text x="227"  y="376" class="wire-label">authoring format</text>

    <text x="399"  y="360" class="wire-label">git source</text>

    <text x="553"  y="360" class="wire">prompt.yml</text>
    <text x="553"  y="376" class="wire-label">delivery bundle</text>

    <text x="815"  y="360" class="wire">artifact://prompts</text>
    <text x="815"  y="376" class="wire-label">versioned dep</text>

    <text x="983"  y="360" class="wire-label">on classpath</text>

    <text x="1137" y="360" class="wire">id · version · name · prompt</text>
    <text x="1137" y="376" class="wire-label">runtime fields</text>
  </g>

  <text x="40" y="448" class="footer">Project landing diagram · See each repo's README for full details.</text>
</svg>
